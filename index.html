<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keja Scan — Live Demo</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* ... Keep your existing :root variables ... */
        :root {
            --g: #1A6B45; --gm: #23885a; --gl: #d4eddf;
            --neon: #39FF14; /* Added for the status glow */
            --bg: #f7f6f2; --card: #ffffff;
            --border: rgba(0,0,0,0.09);
            --r: 10px; --r2: 16px;
        }

        /* [NEW] Enhanced Avatar with Status Glow */
        .sb-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: var(--g);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #fff;
            position: relative;
            /* The glowing ring */
            box-shadow: 0 0 0 2px var(--card), 0 0 0 4px var(--neon);
        }

        /* [FIX] Responsive Grid handling */
        @media (max-width: 900px) {
            .grid3, .grid4 { grid-template-columns: repeat(2, 1fr); }
            .sidebar { width: 70px; }
            .sb-logotxt, .sb-item span:not(.sb-icon), .sb-userinfo, .sb-section { display: none; }
        }

        @media (max-width: 600px) {
            .grid3, .grid4 { grid-template-columns: 1fr; }
        }

        /* Ensure pages toggle correctly */
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="shell">
    <nav class="sidebar">
        <div class="sb-logo">
            <div class="sb-logomark">KS</div>
            <div class="sb-logotxt"><div class="brand">Keja Scan</div><div class="sub">VacantKenya</div></div>
        </div>
        <div class="sb-nav">
            <div class="sb-section">Discover</div>
            <button class="sb-item active" data-page="feed"><span class="sb-icon">🏠</span><span>Live Feed</span></button>
            <button class="sb-item" data-page="map"><span class="sb-icon">🗺</span><span>Map View</span></button>
            <div class="sb-section">Account</div>
            <button class="sb-item" data-page="account"><span class="sb-icon">👤</span><span>My Profile</span></button>
        </div>
        <div class="sb-user">
            <div class="sb-avatar">PK</div>
            <div class="sb-userinfo"><div class="name">Peter Kamau</div><div class="role">Tenant</div></div>
        </div>
    </nav>

    <div class="main">
        <div class="topbar">
            <div class="topbar-title" id="page-title">Live Feed</div>
            <div class="topbar-search"><span class="si">🔍</span><input type="text" placeholder="Search rooms..."></div>
        </div>

        <div class="content">
            <div id="feed" class="page active">
                <div class="grid3">
                    <div class="listing-card">
                        <div class="lc-img" style="background: linear-gradient(135deg,#e8f5ee,#d4eddf);">🏠</div>
                        <div class="lc-body">
                            <div class="lc-type">Bedsitter</div>
                            <div class="lc-name">Greenview Heights</div>
                            <div class="lc-loc">📍 Roysambu, Nairobi</div>
                            <div class="lc-footer">
                                <div class="lc-price">Ksh 12,500</div>
                            </div>
                        </div>
                    </div>
                    </div>
            </div>

            <div id="map" class="page">
                <div class="card card-pad">
                    <h3>Map View</h3>
                    <p>Interactive map loading...</p>
                </div>
            </div>

            <div id="account" class="page">
                <div class="profile-header">
                    <div class="ph-avatar">PK</div>
                    <h2 class="ph-name">Peter Kamau</h2>
                    <p class="ph-role">Verified Tenant</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Navigation Logic
    const navButtons = document.querySelectorAll('.sb-item');
    const pages = document.querySelectorAll('.page');
    const pageTitle = document.getElementById('page-title');

    navButtons.forEach(btn => {
        btn.addEventListener('click', () => {
            const targetPage = btn.getAttribute('data-page');
            
            // Update active button
            navButtons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            // Update active page
            pages.forEach(p => p.classList.remove('active'));
            document.getElementById(targetPage).classList.add('active');

            // Update Topbar text
            pageTitle.innerText = btn.innerText.replace(/[^\w\s]/gi, '').trim();
        });
    });
</script>

</body>
</html>
