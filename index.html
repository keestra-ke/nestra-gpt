<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Keja Scan — Live Demo</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">

<style>

/* ======================================
GLOBAL RESET
====================================== */

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  -webkit-tap-highlight-color:transparent
}

html,body{
  height:100%;
  font-family:'DM Sans',sans-serif;
  background:#f7f6f2;
  color:#1c1c1a;
  font-size:15px;
  line-height:1.5;
  overflow:hidden
}


/* ======================================
COLOR SYSTEM
====================================== */

:root{

  --g:#1A6B45;
  --gl:#d4eddf;
  --gm:#23885a;
  --gd:#0d3d27;

  --o:#E05A1E;
  --ol:#fde8d8;

  --b:#1a5c8a;
  --bl:#d6eaf8;

  --warn:#b45309;
  --warnl:#fef3c7;

  --red:#b91c1c;
  --redl:#fee2e2;

  --txt:#1c1c1a;
  --muted:#6b6b66;
  --hint:#9b9b95;

  --bg:#f7f6f2;
  --card:#ffffff;

  --border:rgba(0,0,0,0.09);
  --border2:rgba(0,0,0,0.16);

  --r:10px;
  --r2:16px;
  --r3:24px;

  --shadow:0 1px 3px rgba(0,0,0,0.07),
           0 4px 12px rgba(0,0,0,0.05);

  --shadow2:0 2px 8px rgba(0,0,0,0.1),
            0 8px 24px rgba(0,0,0,0.08);
}


/* ======================================
APP SHELL
====================================== */

.shell{
  display:flex;
  height:100vh;
  width:100vw;
  overflow:hidden
}


/* ======================================
SIDEBAR NAVIGATION
====================================== */

.sidebar{
  width:220px;
  background:var(--card);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  flex-shrink:0;
  z-index:10
}

.sb-logo{
  padding:20px 18px 16px;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  gap:10px
}

.sb-logomark{
  width:36px;
  height:36px;
  border-radius:9px;
  background:var(--g);
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Syne',sans-serif;
  font-weight:800;
  font-size:13px;
  color:#fff
}

.sb-logotxt .brand{
  font-family:'Syne',sans-serif;
  font-weight:700;
  font-size:14px
}

.sb-logotxt .sub{
  font-size:10px;
  color:var(--g);
  font-weight:500;
  letter-spacing:.06em;
  text-transform:uppercase
}


/* ======================================
MAIN AREA
====================================== */

.main{
  flex:1;
  display:flex;
  flex-direction:column;
  overflow:hidden
}

.topbar{
  height:52px;
  background:var(--card);
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  padding:0 20px;
  gap:12px
}

.content{
  flex:1;
  overflow-y:auto;
  padding:20px
}

.page{
  display:none
}

.page.active{
  display:block
}

</style>

</head>
